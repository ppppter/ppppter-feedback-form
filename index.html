                // 生成日期印章HTML
                var stampHtml = '';
                if (yearStr) {
                    stampHtml = '<div class="preview-header-date">' +
                                    '<span class="stamp-year">' + yearStr + '</span>' +
                                    '<span class="stamp-date">' + monthDayStr + '</span>' +
                                    '<span class="stamp-day">' + dayAbbr + '</span>' +
                                '</div>';
                }

                // 组合页眉
                var headerHtml = '<div class="preview-header">' +
                                    '<h2>' + titleHtml + '</h2>' +
                                 '</div>' +
                                 stampHtml;
                previewContent.innerHTML = headerHtml;
                hasAnyContent = true;

                // 从学科详情表格收集待办事项
                var subjectTasks = {};
                var subjectSections = document.querySelectorAll('.subject-section');
                for (var i = 0; i < subjectSections.length; i++) {
                    var section = subjectSections[i];
                    var subjName = section.dataset.subj || '';
                    var table = section.querySelector('.subj-table');
                    if (!table) continue;
                    
                    var headerRow = table.querySelector('thead tr');
                    var headerThs = headerRow.querySelectorAll('th');
                    var assigneeColIndex = -1;
                    var homeworkColIndex = -1;
                    var knowledgeColIndex = -1;
                    var commentColIndex = -1;
                    
                    // 找到各列的索引位置
                    for (var h = 0; h < headerThs.length; h++) {
                        var thText = headerThs[h].textContent.trim();
                        if (thText === '待辦人') assigneeColIndex = h;
                        if (thText === '作業') homeworkColIndex = h;
                        if (thText === '知識') knowledgeColIndex = h;
                        if (thText === '評語') commentColIndex = h;
                    }
                    if (assigneeColIndex === -1 || homeworkColIndex === -1) continue;
                    
                    var bodyRows = table.querySelectorAll('tbody tr');
                    for (var r = 0; r < bodyRows.length; r++) {
                        var row = bodyRows[r];
                        var tds = row.querySelectorAll('td');
                        if (tds.length <= assigneeColIndex || tds.length <= homeworkColIndex) continue;
                        
                        // 检查是否有内容
                        var hasKnowledgeContent = false;
                        var hasCommentContent = false;
                        if (knowledgeColIndex !== -1 && tds.length > knowledgeColIndex) {
                            var knowledgeInput = tds[knowledgeColIndex].querySelector('input');
                            var knowledgeText = knowledgeInput ? knowledgeInput.value.trim() : '';
                            hasKnowledgeContent = knowledgeText !== '';
                        }
                        if (commentColIndex !== -1 && tds.length > commentColIndex) {
                            var commentInput = tds[commentColIndex].querySelector('input');
                            var commentText = commentInput ? commentInput.value.trim() : '';
                            hasCommentContent = commentText !== '';
                        }
                        
                        // 获取作业内容
                        var homeworkCell = tds[homeworkColIndex];
                        var homeworkInput = homeworkCell.querySelector('input');
                        var homeworkText = homeworkInput ? homeworkInput.value.trim() : '';
                        if (!homeworkText) continue;
                        
                        // 获取选中的待办人
                        var assigneeCell = tds[assigneeColIndex];
                        var assigneeCheckboxes = assigneeCell.querySelectorAll('.assignee-btn input[type="checkbox"]:checked');
                        var selectedAssignees = [];
                        for (var a = 0; a < assigneeCheckboxes.length; a++) {
                            selectedAssignees.push(assigneeCheckboxes[a].value);
                        }
                        
                        // 如果有内容但没有待办人，跳过
                        if ((hasKnowledgeContent || hasCommentContent) && selectedAssignees.length === 0) continue;
                        
                        // 添加到学科任务列表
                        if (!subjectTasks[subjName]) {
                            subjectTasks[subjName] = [];
                        }
                        subjectTasks[subjName].push({
                            task: homeworkText,
                            assignees: selectedAssignees
                        });
                    }
                }
                
                // 生成待办事项表格
                var subjectNames = Object.keys(subjectTasks);
                if (subjectNames.length > 0) {
                    var todoTableHtml = '<div class="preview-section">' +
                        '<h3><i class="fas fa-list-alt"></i> 待辦</h3>' +
                        '<table class="preview-table todo-table" style="margin-top: 8px;"><tbody>';
                    for (var i = 0; i < subjectNames.length; i++) {
                        var subjName = subjectNames[i];
                        var taskItems = subjectTasks[subjName];
                        var formattedTasks = [];
                        for (var t = 0; t < taskItems.length; t++) {
                            var item = taskItems[t];
                            var taskText = item.task;
                            if (item.assignees.length > 0) {
                                taskText += '(' + item.assignees.join('&') + ')';
                            }
                            formattedTasks.push(taskText);
                        }
                        var tasksText = formattedTasks.join('；');
                        todoTableHtml += '<tr>' +
                            '<td style="width: 35px; font-weight: bold; color: #1e3a8a; white-space: nowrap;">' + escapeHtml(subjName) + '</td>' +
                            '<td style="color: #000000;">' + escapeHtml(tasksText) + '</td>' +
                            '</tr>';
                    }
                    todoTableHtml += '</tbody></table></div>';
                    previewContent.innerHTML += todoTableHtml;
                    hasAnyContent = true;
                }

                // 生成学科详情
                var subjChecks = document.querySelectorAll('.subj-check:checked');
                var subjectBlocks = [];
                for (var i = 0; i < subjChecks.length; i++) {
                    var checkbox = subjChecks[i];
                    var section = checkbox.closest('.subject-section');
                    if (!section) continue;
                    var subjName = section.dataset.subj || '未知學科';
                    var table = section.querySelector('.subj-table');
                    if (!table) continue;
                    var headerRow = table.querySelector('thead tr');
                    var bodyRows = table.querySelectorAll('tbody tr');
                    if (bodyRows.length === 0) continue;

                    var headerThs = headerRow.querySelectorAll('th:not(.action-col)');
                    var tableHtml = '<table class="preview-table"><thead><tr>';
                    for (var j = 0; j < headerThs.length; j++) {
                        var th = headerThs[j];
                        var input = th.querySelector('.knowledge-header-input');
                        var thText = input ? input.value : th.textContent.trim();
                        if (thText === '待辦人') continue;  // 预览不显示待办人列
                        tableHtml += '<th>' + escapeHtml(thText) + '</th>';
                    }
                    tableHtml += '</tr></thead><tbody>';

                    var hasAnyRow = false;
                    for (var r = 0; r < bodyRows.length; r++) {
                        var row = bodyRows[r];
                        var tds = row.querySelectorAll('td');
                        var rowCells = [];
                        var hasContent = false;

                        for (var c = 0; c < tds.length; c++) {
                            if (c === tds.length - 1) continue;  // 跳过操作列
                            if (c >= headerThs.length) continue;

                            var td = tds[c];
                            var thText = headerThs[c] ? (headerThs[c].querySelector('.knowledge-header-input') ? headerThs[c].querySelector('.knowledge-header-input').value : headerThs[c].textContent.trim()) : '';
                            
                            if (thText === '待辦人') continue;
                            
                            var input = td.querySelector('input');
                            var val = input ? input.value : '';
                            
                            if (thText === '知識' || thText === '評語') {
                                if (val && val.trim()) {
                                    hasContent = true;
                                }
                            }
                            
                            rowCells.push('<td>' + escapeHtml(val) + '</td>');
                        }
                        
                        if (!hasContent) continue;
                        
                        hasAnyRow = true;
                        tableHtml += '<tr>' + rowCells.join('') + '</tr>';
                    }
                    tableHtml += '</tbody></table>';

                    if (!hasAnyRow) continue;

                    subjectBlocks.push({
                        name: subjName,
                        html: tableHtml
                    });
                }

                if (subjectBlocks.length > 0) {
                    var detailsHtml = '<div class="preview-section">' +
                                        '<h3><i class="fas fa-book-open"></i> 學科詳情</h3>';
                    for (var b = 0; b < subjectBlocks.length; b++) {
                        detailsHtml += '<div class="preview-subject-block">' +
                                        '<h4><i class="fas fa-angle-right"></i> ' + escapeHtml(subjectBlocks[b].name) + '</h4>' +
                                        subjectBlocks[b].html +
                                    '</div>';
                    }
                    detailsHtml += '</div>';
                    previewContent.innerHTML += detailsHtml;
                    hasAnyContent = true;
                }

                // 生成总结
                var summaryInput = document.getElementById('summaryInput');
                if (summaryInput && summaryInput.value.trim() !== '') {
                    previewContent.innerHTML += 
                        '<div class="preview-section">' +
                            '<h3><i class="fas fa-comment-dots"></i> 總結</h3>' +
                            '<p style="color:#000000;font-size:12px;">' + escapeHtml(summaryInput.value) + '</p>' +
                        '</div>';
                    hasAnyContent = true;
                }

                // 如果没有任何内容，显示提示
                if (!hasAnyContent) {
                    previewContent.innerHTML = '<div class="preview-placeholder">✨ 仲未填寫任何反饋內容，請填寫後重新預覽。</div>';
                }

            } catch (err) {
                console.error('預覽生成出錯：', err);
                previewContent.innerHTML = '<div class="preview-error">❌ 預覽生成失敗，請檢查控制台錯誤信息。<br>' + escapeHtml(err.message) + '</div>';
            } finally {
                // 最终显示预览容器
                previewContainer.style.display = 'block';
            }
        };

        // ========== 9. 下载功能 ==========

        /* 下载预览内容为JPG图片 */
        window.downloadAsJPG = function() {
            var previewContainer = document.getElementById('previewContainer');
            if (!previewContainer) {
                alert('預覽容器不存在');
                return;
            }
            
            // 如果预览区域隐藏，先显示
            if (previewContainer.style.display === 'none' || previewContainer.style.display === '') {
                if (document.getElementById('previewContent').innerHTML.trim() === '') {
                    alert('請先生成預覽');
                    return;
                }
                previewContainer.style.display = 'block';
            }

            // 使用html2canvas将HTML转换为canvas
            html2canvas(previewContainer, {
                scale: 2,  // 2倍分辨率，更清晰
                backgroundColor: '#ffffff',  // 白色背景
                allowTaint: false,
                useCORS: true,  // 允许跨域图片
                logging: false,
                imageTimeout: 0
            }).then(function(canvas) {
                // 生成文件名
                var filename = '輔導總結_' + new Date().getTime() + '.jpg';
                
                try {
                    var link = document.createElement('a');
                    link.download = filename;
                    link.href = canvas.toDataURL('image/jpeg', 0.9);  // 转换为JPEG格式，90%质量
                    
                    // 检测是否为移动端
                    var isMobile = /iPhone|iPad|iPod|Android|UCBrowser|UCWEB|Mobile/.test(navigator.userAgent);
                    
                    if (isMobile) {
                        // 移动端：打开新标签页显示图片
                        var dataUrl = canvas.toDataURL('image/jpeg', 0.9);
                        var newTab = window.open();
                        if (newTab) {
                            newTab.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"><title>輔導總結</title><style>body{margin:0;padding:20px;display:flex;flex-direction:column;justify-content:center;align-items:center;min-height:100vh;background:#f5f5f5;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}.container{text-align:center;max-width:100%}img{max-width:100%;height:auto;border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,0.15)}.tip{margin-top:24px;color:#666;font-size:15px;line-height:1.6;padding:0 20px}.btn{display:inline-block;margin-top:20px;padding:12px 32px;background:#2196f3;color:#fff;text-decoration:none;border-radius:30px;font-size:15px}</style></head><body><div class="container"><img src="' + dataUrl + '" alt="輔導總結"/><p class="tip">長按圖片即可保存到相冊</p><a href="' + dataUrl + '" download="' + filename + '" class="btn">點擊下載</a></div></body></html>');
                            newTab.document.close();
                        } else {
                            showImageModal(dataUrl, filename);
                        }
                    } else {
                        // 桌面端：直接下载
                        link.style.display = 'none';
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                    }
                } catch (e) {
                    showImageModal(canvas.toDataURL('image/jpeg', 0.9), filename);
                }
            }).catch(function(error) {
                console.error('截圖失敗：', error);
                alert('截圖失敗，請稍後再試。');
            });
        };
        
        /* 显示图片模态框（用于移动端无法弹窗的情况） */
        function showImageModal(dataUrl, filename) {
            // 创建模态框容器
            var modal = document.createElement('div');
            modal.id = 'imageDownloadModal';
            modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:99999;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:20px;box-sizing:border-box;';
            
            // 创建图片元素
            var img = document.createElement('img');
            img.src = dataUrl;
            img.style.cssText = 'max-width:100%;max-height:70vh;height:auto;border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,0.3);';
            
            // 创建提示文字
            var tip = document.createElement('p');
            tip.textContent = '長按圖片保存到相冊';
            tip.style.cssText = 'color:#fff;font-size:16px;margin-top:20px;text-align:center;';
            
            // 创建关闭按钮
            var closeBtn = document.createElement('button');
            closeBtn.textContent = '關閉';
            closeBtn.style.cssText = 'margin-top:20px;padding:10px 30px;background:#fff;color:#333;border:none;border-radius:25px;font-size:15px;cursor:pointer;';
            closeBtn.onclick = function() {
                document.body.removeChild(modal);
            };
            
            // 组装模态框
            modal.appendChild(img);
            modal.appendChild(tip);
            modal.appendChild(closeBtn);
            
            // 点击背景关闭
            modal.onclick = function(e) {
                if (e.target === modal) {
                    document.body.removeChild(modal);
                }
            };
            
            document.body.appendChild(modal);
        }

        // ========== 10. 表单重置功能 ==========

        /* 重置表单到初始状态 */
        window.resetForm = function() {
            // 清空所有输入框
            var inputs = document.querySelectorAll('input, textarea');
            for (var i = 0; i < inputs.length; i++) {
                var el = inputs[i];
                if (el.type === 'checkbox' || el.type === 'radio') {
                    el.checked = false;
                } else if (el.tagName === 'TEXTAREA' || el.type === 'text' || el.type === 'date') {
                    el.value = '';
                }
            }
            
            // 重置姓名复选框
            var nameCheckboxes = document.querySelectorAll('input[name="studentName"]');
            for (var i = 0; i < nameCheckboxes.length; i++) {
                nameCheckboxes[i].checked = false;
            }

            // 恢复表格到初始状态
            var currentTables = document.querySelectorAll('.subj-table');
            for (var i = 0; i < currentTables.length; i++) {
                if (tableTemplates[i]) {
                    var newTable = tableTemplates[i].cloneNode(true);
                    currentTables[i].parentNode.replaceChild(newTable, currentTables[i]);
                }
            }

            // 清空待办事项输入框
            var todoRows = document.querySelectorAll('.todo-row');
            for (var i = 0; i < todoRows.length; i++) {
                var row = todoRows[i];
                var groups = row.querySelectorAll('.todo-input-group');
                // 只保留第一个输入框，删除其他的
                for (var j = groups.length - 1; j > 0; j--) {
                    groups[j].remove();
                }
                var firstInput = row.querySelector('.todo-input');
                if (firstInput) firstInput.value = '';
            }

            // 隐藏预览容器
            var previewContainer = document.getElementById('previewContainer');
            if (previewContainer) previewContainer.style.display = 'none';

            // 清除本地存储
            localStorage.removeItem('feedbackFormData');
        };

        // ========== 11. 自动保存功能 ==========

        /* 本地存储的键名 */
        var saveTimeout = null;
        var STORAGE_KEY = 'feedbackFormData';

        /* 保存表单数据到本地存储 */
        function saveFormData() {
            // 收集所有表单数据
            var studentNameCheckboxes = document.querySelectorAll('input[name="studentName"]:checked');
            var selectedNames = [];
            for (var i = 0; i < studentNameCheckboxes.length; i++) {
                selectedNames.push(studentNameCheckboxes[i].value);
            }
            
            var data = {
                feedbackDate: document.getElementById('feedbackDate').value,
                studentNames: selectedNames,
                written: document.querySelector('input[name="written"]:checked') ? document.querySelector('input[name="written"]:checked').value : null,
                ipad: document.querySelector('input[name="ipad"]:checked') ? document.querySelector('input[name="ipad"]:checked').value : null,
                todoSubjects: {},
                subjects: {},
                summary: document.getElementById('summaryInput').value,
                lastSaved: new Date().toISOString()
            };

            // 收集待办事项数据
            var todoSubjects = document.querySelectorAll('.todo-subject');
            for (var i = 0; i < todoSubjects.length; i++) {
                var subject = todoSubjects[i];
                var subjName = subject.dataset.subj;
                var subjEl = subject.querySelector('.todo-subject');
                var chk = subject.querySelector('.todo-check');
                var inputs = subject.querySelectorAll('.todo-input');
                var values = [];
                for (var j = 0; j < inputs.length; j++) {
                    if (inputs[j].value.trim() !== '') {
                        values.push(inputs[j].value.trim());
                    }
                }
                if (values.length > 0 || (chk && chk.checked)) {
                    data.todoSubjects[subjName] = {
                        checked: chk ? chk.checked : false,
                        values: values
                    };
                }
            }

            // 收集学科详情数据
            var subjectSections = document.querySelectorAll('.subject-section');
            for (var i = 0; i < subjectSections.length; i++) {
                var section = subjectSections[i];
                var subjName = section.dataset.subj;
                var chk = section.querySelector('.subj-check');
                var table = section.querySelector('.subj-table');
                if (!table) continue;

                var headerRow = table.querySelector('thead tr');
                var headerThs = headerRow.querySelectorAll('th');
                var headers = [];
                for (var h = 0; h < headerThs.length; h++) {
                    if (headerThs[h].classList.contains('action-col')) continue;
                    var input = headerThs[h].querySelector('.knowledge-header-input');
                    headers.push(input ? input.value : headerThs[h].textContent.trim());
                }

                var bodyRows = table.querySelectorAll('tbody tr');
                var rows = [];
                for (var r = 0; r < bodyRows.length; r++) {
                    var row = bodyRows[r];
                    var tds = row.querySelectorAll('td');
                    var rowData = [];
                    for (var c = 0; c < tds.length; c++) {
                        if (tds[c].classList.contains('action-col')) continue;
                        var thText = headers[c] || '';
                        if (thText === '待辦人') {
                            var assigneeCheckboxes = tds[c].querySelectorAll('.assignee-btn input[type="checkbox"]:checked');
                            var selectedAssignees = [];
                            for (var a = 0; a < assigneeCheckboxes.length; a++) {
                                selectedAssignees.push(assigneeCheckboxes[a].value);
                            }
                            rowData.push(selectedAssignees);
                        } else {
                            var input = tds[c].querySelector('input');
                            rowData.push(input ? input.value : '');
                        }
                    }
                    if (rowData.length > 0) {
                        rows.push(rowData);
                    }
                }

                data.subjects[subjName] = {
                    checked: chk ? chk.checked : false,
                    headers: headers,
                    rows: rows
                };
            }

            // 保存到本地存储
            try {
                // JSON.stringify将JavaScript对象转换为JSON字符串
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            } catch (e) {
                console.warn('保存數據失敗：', e);
            }
        }

        /* 防抖保存：延迟500毫秒后保存，避免频繁保存 */
        function debounceSave() {
            if (saveTimeout) {
                clearTimeout(saveTimeout);
            }
            saveTimeout = setTimeout(function() {
                saveFormData();
            }, 500);
        }

        /* 从本地存储加载表单数据 */
        function loadFormData() {
            var savedData = localStorage.getItem(STORAGE_KEY);
            if (!savedData) return;

            try {
                // JSON.parse将JSON字符串转换为JavaScript对象
                var data = JSON.parse(savedData);

                // 恢复日期
                if (data.feedbackDate) {
                    document.getElementById('feedbackDate').value = data.feedbackDate;
                }
                
                // 恢复选中的学生
                if (data.studentNames && Array.isArray(data.studentNames)) {
                    for (var i = 0; i < data.studentNames.length; i++) {
                        var checkbox = document.querySelector('input[name="studentName"][value="' + data.studentNames[i] + '"]');
                        if (checkbox) checkbox.checked = true;
                    }
                }
                
                // 恢复作业完成情况
                if (data.written) {
                    var writtenRadio = document.querySelector('input[name="written"][value="' + data.written + '"]');
                    if (writtenRadio) writtenRadio.checked = true;
                }
                if (data.ipad) {
                    var ipadRadio = document.querySelector('input[name="ipad"][value="' + data.ipad + '"]');
                    if (ipadRadio) ipadRadio.checked = true;
                }

                // 恢复待办事项
                if (data.todoSubjects) {
                    for (var subjName in data.todoSubjects) {
                        var subject = document.querySelector('.todo-subject[data-subj="' + subjName + '"]');
                        if (!subject) continue;
                        var subjData = data.todoSubjects[subjName];
                        var chk = subject.querySelector('.todo-check');
                        if (chk) chk.checked = subjData.checked;

                        var todoRow = subject.querySelector('.todo-row');
                        if (!todoRow) continue;
                        var firstGroup = todoRow.querySelector('.todo-input-group');
                        var firstInput = firstGroup ? firstGroup.querySelector('.todo-input') : null;

                        if (firstInput && subjData.values.length > 0) {
                            firstInput.value = subjData.values[0];
                        }

                        for (var v = 1; v < subjData.values.length; v++) {
                            var btn = todoRow.querySelector('.add-todo-btn');
                            if (btn) {
                                addTodoItem(btn);
                                var groups = todoRow.querySelectorAll('.todo-input-group');
                                var lastGroup = groups[groups.length - 1];
                                var lastInput = lastGroup ? lastGroup.querySelector('.todo-input') : null;
                                if (lastInput) lastInput.value = subjData.values[v];
                            }
                        }
                    }
                }

                // 恢复学科详情
                if (data.subjects) {
                    for (var subjName in data.subjects) {
                        var section = document.querySelector('.subject-section[data-subj="' + subjName + '"]');
                        if (!section) continue;
                        var subjData = data.subjects[subjName];
                        var chk = section.querySelector('.subj-check');
                        if (chk) chk.checked = subjData.checked;

                        var table = section.querySelector('.subj-table');
                        if (!table) continue;

                        var headerRow = table.querySelector('thead tr');
                        var headerThs = headerRow.querySelectorAll('th');
                        for (var h = 0; h < headerThs.length && h < subjData.headers.length; h++) {
                            if (headerThs[h].classList.contains('action-col')) continue;
                            var headerInput = headerThs[h].querySelector('.knowledge-header-input');
                            if (headerInput) {
                                headerInput.value = subjData.headers[h];
                            }
                        }

                        var tbody = table.querySelector('tbody');
                        var existingRows = tbody.querySelectorAll('tr');
                        for (var r = 0; r < subjData.rows.length; r++) {
                            var rowData = subjData.rows[r];
                            var targetRow;
                            if (r < existingRows.length) {
                                targetRow = existingRows[r];
                            } else {
                                var addHwBtn = table.querySelector('.homework-cell .add-btn');
                                if (addHwBtn) addHomework(addHwBtn);
                                targetRow = tbody.lastElementChild;
                            }
                            if (!targetRow) continue;
                            var tds = targetRow.querySelectorAll('td');
                            var valIdx = 0;
                            for (var c = 0; c < tds.length && valIdx < rowData.length; c++) {
                                if (tds[c].classList.contains('action-col')) continue;
                                var thText = subjData.headers[valIdx] || '';
                                if (thText === '待辦人' && Array.isArray(rowData[valIdx])) {
                                    var assigneeCheckboxes = tds[c].querySelectorAll('.assignee-btn input[type="checkbox"]');
                                    for (var a = 0; a < assigneeCheckboxes.length; a++) {
                                        var isChecked = rowData[valIdx].indexOf(assigneeCheckboxes[a].value) !== -1;
                                        assigneeCheckboxes[a].checked = isChecked;
                                        var btn = assigneeCheckboxes[a].closest('.assignee-btn');
                                        if (btn) {
                                            if (isChecked) {
                                                btn.classList.add('selected');
                                            } else {
                                                btn.classList.remove('selected');
                                            }
                                        }
                                    }
                                    valIdx++;
                                } else {
                                    var input = tds[c].querySelector('input');
                                    if (input) {
                                        input.value = rowData[valIdx];
                                        valIdx++;
                                    }
                                }
                            }
                        }
                    }
                }

                // 恢复总结
                if (data.summary) {
                    document.getElementById('summaryInput').value = data.summary;
                }
            } catch (e) {
                console.warn('恢復數據失敗：', e);
            }
        }

        // ========== 12. 事件监听器设置 ==========

        /* 监听input事件（用户输入时自动保存） */
        document.addEventListener('input', function(e) {
            debounceSave();
        });

        /* 监听change事件（用户改变选项时自动保存） */
        document.addEventListener('change', function(e) {
            debounceSave();
        });

        /* 页面即将离开时保存数据 */
        window.addEventListener('beforeunload', function(e) {
            if (saveTimeout) {
                clearTimeout(saveTimeout);
            }
            saveFormData();
        });

        /* 页面显示时加载数据（支持往返缓存） */
        window.addEventListener('pageshow', function(e) {
            if (e.persisted) {
                loadFormData();
            }
        });

        /* 页面加载完成后初始化数据 */
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', loadFormData);
        } else {
            loadFormData();
        }

        // ========== 13. PWA（渐进式网页应用）支持 ==========

        /* 注册 Service Worker，使网页能够离线使用 */
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                console.log('[PWA] 正在注册 Service Worker...');
                navigator.serviceWorker.register('./sw.js')
                    .then(function(registration) {
                        console.log('[PWA] Service Worker 注册成功，作用域:', registration.scope);
                    })
                    .catch(function(error) {
                        console.error('[PWA] Service Worker 注册失败:', error);
                    });
            });
        }

    </script>
</body>
</html>
